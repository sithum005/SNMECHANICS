<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - SN Mechanics</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#030712',
                            DEFAULT: '#0EA5E9',
                            light: '#E0F2FE'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-[#030712] text-slate-100 antialiased overflow-x-hidden">

    <!-- Navbar -->
    <nav class="fixed w-full z-50 bg-[#030712]/90 backdrop-blur-md border-b border-white/5 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-2xl font-bold tracking-tight text-brand brand-font">SN Mechanics</a>
                </div>
                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-10">
                        <a href="index.html" class="nav-link text-slate-300 font-medium hover:text-white transition px-1 py-2">Home</a>
                        <a href="services.html" class="nav-link text-slate-300 font-medium hover:text-white transition px-1 py-2">Services</a>
                        <a href="our-exp.html" class="nav-link text-slate-300 font-medium hover:text-white transition px-1 py-2">Our Exp</a>
                        <a href="gallery.html" class="nav-link active text-white font-medium hover:text-white transition px-1 py-2">Gallery</a>
                        <a href="contact.html" class="nav-link text-slate-300 font-medium hover:text-white transition px-1 py-2">Contact</a>
                    </div>
                </div>
                <!-- Mobile menu button -->
                <div class="-mr-2 flex md:hidden">
                    <button type="button" class="inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-white hover:bg-white/10" aria-controls="mobile-menu" aria-expanded="false" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                        <span class="sr-only">Open main menu</span>
                        <svg class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div class="md:hidden hidden bg-[#030712] border-b border-white/10 glass-panel" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 text-center">
                <a href="index.html" class="text-slate-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Home</a>
                <a href="services.html" class="text-slate-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Services</a>
                <a href="our-exp.html" class="text-slate-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Our Exp</a>
                <a href="gallery.html" class="text-brand block px-3 py-2 rounded-md text-base font-medium">Gallery</a>
                <a href="contact.html" class="text-slate-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="pt-32 pb-16 bg-[#030712] relative overflow-hidden">
        <div class="absolute top-0 right-0 -translate-x-1/3 -translate-y-1/3 w-[600px] h-[600px] bg-brand/10 rounded-full blur-[100px] pointer-events-none animate-float-delayed"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center fade-in-up">
            <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6 brand-font tracking-tight">Gallery</h1>
        </div>
    </header>

    <!-- Gallery Grid -->
    <!-- The structure is clean and focuses purely on high-quality images. No text overlays, no hover zooms, full click-to-view -->
    <main class="pb-24 relative z-10 w-full">
        <div class="max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8">
            <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                
                <!-- Dynamic generation logic for HTML -->
                <script>
                    const galleryGrid = document.getElementById('gallery-grid');
                    let htmlContent = '';
                    // Generating 50 images placeholder
                    for (let i = 1; i <= 50; i++) {
                        // Adding staggering delays classes only for the first few rows to prevent mass animation lockup
                        const delayClass = (i <= 15) ? `delay-${(i % 5) * 100}` : '';
                        
                        htmlContent += `
                            <div class="fade-in-up ${delayClass} gallery-item bg-white/5 rounded-xl overflow-hidden glass-panel hover:border-brand/40 transition duration-300 cursor-zoom-in shadow-xl hover:shadow-brand/20 aspect-video md:aspect-square">
                                <img src="assets/images/gallery/gallery-${i}.jpg" alt="Gallery Image ${i}" class="w-full h-full object-cover">
                            </div>
                        `;
                    }
                    galleryGrid.innerHTML = htmlContent;
                </script>

            </div>

            <!-- Hint for replacement -->
            <div class="mt-20 scale-in glass-panel p-8 rounded-2xl text-center max-w-2xl mx-auto relative overflow-hidden">
                <div class="absolute inset-0 bg-brand/5"></div>
                <svg class="w-10 h-10 text-brand mx-auto mb-4 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
               
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#010309] border-t border-white/5 pt-16 pb-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center">
            <h2 class="text-3xl font-bold text-white mb-6 brand-font tracking-tight">SN Mechanics</h2>
            <div class="flex space-x-8 mb-8">
                <a href="index.html" class="text-slate-400 hover:text-brand transition text-sm uppercase tracking-wider font-semibold">Home</a>
                <a href="services.html" class="text-slate-400 hover:text-brand transition text-sm uppercase tracking-wider font-semibold">Services</a>
                <a href="our-exp.html" class="text-slate-400 hover:text-brand transition text-sm uppercase tracking-wider font-semibold">Our Exp</a>
                <a href="gallery.html" class="text-slate-400 hover:text-brand transition text-sm uppercase tracking-wider font-semibold">Gallery</a>
                <a href="contact.html" class="text-slate-400 hover:text-brand transition text-sm uppercase tracking-wider font-semibold">Contact</a>
            </div>
            <p class="text-slate-600 text-sm font-light">
                &copy; 2026 SN Mechanics. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="assets/js/scripts.js"></script>
</body>
</html>
